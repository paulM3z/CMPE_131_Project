{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🎓</span>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your CampusHub account</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form action="/auth/login{% if request.query_params.get('next') %}?next={{ request.query_params.get('next') }}{% endif %}"
              method="post" class="auth-form" novalidate>

            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    value="{{ form.username if form else '' }}"
                    placeholder="Enter your username"
                    required
                    autofocus
                />
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-with-toggle">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                    />
                    <button type="button" class="toggle-password" data-target="password" aria-label="Show/hide password">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="/auth/register" class="link">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
